dataset:
  primary: waymo_open_motion
  womd_root: /mnt/data1/wzy/datasets/waymo_open_motion
  waymo_perception_root: /mnt/data1/wzy/datasets/waymo_open_perception
  occ3d_waymo_root: /mnt/data1/wzy/datasets/occ3d_waymo
  occ3d_nuscenes_root: /mnt/data1/wzy/datasets/occ3d_nuscenes
  nuplan_root: /mnt/data1/wzy/datasets/nuplan

time:
  history_steps: 10
  current_step: 10
  future_steps: 80
  future_stride: 5
  max_supervised_seconds: 8
  sample_rate_hz: 10

bev:
  x_min: -80.0
  x_max: 80.0
  y_min: -80.0
  y_max: 80.0
  resolution: 0.5
  height: 320
  width: 320
  classes:
    - vehicle
    - pedestrian
    - cyclist
    - other

model:
  name: bev_occupancy_flow_world_model
  hidden_dim: 256
  num_heads: 8
  depth: 8
  num_modes: 6
  sensor_dim: 256
  map_encoder: vector_polyline_transformer
  traffic_light_encoder: attention_pooling
  sensor_encoder: camera_lidar_token_adapter
  temporal_core: temporal_transformer
  heads:
    occupancy: true
    flow: true
    trajectory: true
    dense_occ3d: true
    ego_planner: true
    risk: true
  losses:
    balanced_occupancy_bce: true
    occupancy_dice: true
    far_horizon_weighting: true
    trajectory_occupancy_consistency: true
    ego_collision_regularization: true

generative_model:
  name: conditional_bev_diffusion_world_model
  enabled: true
  scheduler: diffusers.DDIMScheduler
  denoiser: custom_conditional_bev_denoiser
  denoising_target:
    occupancy: true
    flow: true
  num_train_timesteps: 1000
  default_num_inference_steps: 50
  hidden_dim: 192
  condition:
    past_bev: true
    raster_map: true
    vector_map: true
    agents: true
    traffic_lights: true
    camera_lidar_tokens: true

train:
  batch_size_per_gpu: 2
  num_gpus: 8
  learning_rate: 0.0002
  epochs: 20
  num_workers: 8
